<template>
    <!-- Full Container Box -->
    <div class="slds-box slds-theme_default slds-p-around_medium">
    
    <lightning-card title="Feedback Recovery Path">
        <!-- Path Progress Indicator -->
        <lightning-progress-indicator
          current-step={currentStage}
          type="path"
          variant="base"
          class="slds-m-bottom_medium">
          <template for:each={stages} for:item="stage">
            <lightning-progress-step
              key={stage}
              label={stage}
              value={stage}
              onclick={handleStageClick}>
            </lightning-progress-step>
          </template>
        </lightning-progress-indicator>
  
        <!-- Two-Column Layout: Fields + Guidance -->
        <div class="slds-grid slds-wrap slds-p-horizontal_medium slds-p-vertical_small">
  
          <!-- Left Column: Key Fields in 2-Columns -->
          <div class="slds-col slds-size_1-of-2">
            <h3 class="slds-text-heading_small slds-m-bottom_medium">Key Fields</h3>
            <div class="slds-grid slds-wrap slds-gutters">
  
              <!-- Column 1 -->
              <div class="slds-col slds-size_1-of-2">
                <div class="slds-form-element slds-m-bottom_small">
                  <span class="slds-form-element__label slds-text-title_bold">Opportunity Name</span>
                  <div class="slds-form-element__control">{opportunity.Name}</div>
                </div>
  
                <div class="slds-form-element slds-m-bottom_small">
                  <span class="slds-form-element__label slds-text-title_bold">Stage</span>
                  <div class="slds-form-element__control">{opportunity.StageName}</div>
                </div>
  
                <div class="slds-form-element slds-m-bottom_small">
                  <span class="slds-form-element__label slds-text-title_bold">Next Step</span>
                  <div class="slds-form-element__control">{opportunity.NextStep}</div>
                </div>
              </div>
  
              <!-- Column 2 -->
              <div class="slds-col slds-size_1-of-2">
                <div class="slds-form-element slds-m-bottom_small">
                  <span class="slds-form-element__label slds-text-title_bold">Description</span>
                  <div class="slds-form-element__control">{opportunity.Description}</div>
                </div>
  
                <div class="slds-form-element slds-m-bottom_small">
                  <span class="slds-form-element__label slds-text-title_bold">Type</span>
                  <div class="slds-form-element__control">{opportunity.Type}</div>
                </div>
              </div>
  
            </div>
          </div>
  
          <!-- Right Column: Stage Guidance (Centered with Button) -->
          <div class="slds-col slds-size_1-of-2 slds-align-middle slds-grid slds-grid_vertical-align-center slds-grid_align-center">
            <div class="slds-text-align_center">
              <template if:true={stageGuidance}>
                <h1 class="slds-text-heading_large slds-m-bottom_small" style="font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;">{stageGuidance.heading}</h1>
                <p class="slds-text-title_bold slds-m-bottom_medium">{stageGuidance.subtext}</p>
                <lightning-button
                  label="Details"
                  variant="brand"
                  onclick={openOpportunityRecord}>
                </lightning-button>
              </template>
            </div>
          </div>
  
        </div>
    </lightning-card>
    </div>
  </template>
