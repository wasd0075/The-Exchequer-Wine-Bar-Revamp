<template>
    <div class="container" style={backgroundStyle}>
        <div class="content-box">
            <!-- Left Section -->
            <div class="left">
                <h1>JOIN OUR LOYALTY PROGRAM</h1>
                <p>Earn points every time you dine and unlock exclusive benefits. Choose your tier and enjoy the perks!</p>
                <button class="cta-button" onclick={handleClick}>APPLY NOW</button>
            </div>

            <!-- Right Section: Tiers Horizontally -->
            <div class="right">
                <div class="card silver">
                    <h1>Silver</h1>
                    <p class="desc">Great for casual visitors</p>
                    <div class="price">30<span class="points-label">pts</span></div>
                    <ul class="features">
                        <li>5% Discount</li>
                        <li>Birthday Treat</li>
                        <li>Exclusive Newsletter</li>
                    </ul>
                    <button class="tier-button silver-btn">Get Silver</button>
                </div>

                <div class="card gold">
                    <h1>Gold</h1>
                    <p class="desc">Perfect for regulars</p>
                    <div class="price">50<span class="points-label">pts</span></div>
                    <ul class="features">
                        <li>10% Discount</li>
                        <li>Free Drink (5 Visits)</li>
                        <li>Early Event Access</li>
                    </ul>
                    <button class="tier-button gold-btn">Get Gold</button>
                </div>

                <div class="card platinum">
                    <h1>Platinum</h1>
                    <p class="desc">For our elite guests</p>
                    <div class="price">70<span class="points-label">pts</span></div>
                    <ul class="features">
                        <li>20% Discount</li>
                        <li>VIP Seating</li>
                        <li>Free Bottle Days</li>
                    </ul>
                    <button class="tier-button platinum-btn">Get Platinum</button>
                </div>
            </div>
        </div>
    </div>
</template>
